<!DOCTYPE html>
<html lang="en">
<head>
<title>NOVUS Dashboard</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>

body{
margin:0;
font-family:Segoe UI;
background: radial-gradient(circle at 20% 30%, #0f2027, #070b1a 60%);
color:white;
}

/* NAVBAR */

.top-nav{
height:60px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
}

.logo{
font-size:20px;
font-weight:bold;
background:linear-gradient(90deg,#00d4ff,#a855f7);
-webkit-background-clip:text;
color:transparent;
}

/* CHATBOT */

#chatbot-container{
position:fixed;
bottom:30px;
right:30px;
z-index:999;
}

.chat-trigger{
width:60px;
height:60px;
border-radius:50%;
background:linear-gradient(135deg,#00d4ff,#a855f7);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:22px;
box-shadow:0 0 20px rgba(0,212,255,0.5);
}

.chat-window{
position:absolute;
bottom:80px;
right:0;
width:350px;
height:500px;
background:#0f2027;
border-radius:20px;
display:none;
flex-direction:column;
overflow:hidden;
border:1px solid rgba(255,255,255,0.1);
}

.chat-header{
padding:15px;
background:linear-gradient(90deg,#00d4ff33,#a855f733);
display:flex;
justify-content:space-between;
}

.chat-messages{
flex:1;
padding:20px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:12px;
}

.message{
max-width:80%;
padding:10px 14px;
border-radius:14px;
font-size:14px;
}

.bot-msg{
background:rgba(255,255,255,0.1);
align-self:flex-start;
}

.user-msg{
background:linear-gradient(135deg,#00d4ffaa,#a855f7aa);
align-self:flex-end;
}

.chat-input-area{
display:flex;
padding:10px;
gap:10px;
background:rgba(255,255,255,0.05);
}

.chat-input{
flex:1;
border:none;
border-radius:10px;
padding:10px;
background:#00000040;
color:white;
}

.chat-send{
width:40px;
border:none;
background:linear-gradient(135deg,#00d4ff,#a855f7);
border-radius:10px;
cursor:pointer;
color:white;
}

</style>
</head>

<body>

<div class="top-nav">
<div class="logo">NOVUS</div>
</div>

<!-- CHATBOT -->

<div id="chatbot-container">

<div class="chat-trigger" onclick="toggleChat()">
<i class="fas fa-robot"></i>
</div>

<div class="chat-window" id="chatWindow">

<div class="chat-header">
<span>Rosie Assistant</span>
<i class="fas fa-times" onclick="toggleChat()" style="cursor:pointer"></i>
</div>

<div class="chat-messages" id="chatMsgs">

<div class="message bot-msg">
Hello 👋 I am Rosie. How can I help you?
</div>

</div>

<div class="chat-input-area">
<input id="chatInput" class="chat-input" placeholder="Ask Rosie...">
<button class="chat-send" onclick="sendMessage()">
<i class="fas fa-paper-plane"></i>
</button>
</div>

</div>
</div>

<script>

function toggleChat(){
const win=document.getElementById("chatWindow");

if(win.style.display==="flex"){
win.style.display="none";
}else{
win.style.display="flex";
}
}

function appendMessage(text,type){

const chat=document.getElementById("chatMsgs");

const div=document.createElement("div");

div.className="message "+(type==="user"?"user-msg":"bot-msg");

div.innerText=text;

chat.appendChild(div);

chat.scrollTop=chat.scrollHeight;
}

async function sendMessage(){

const input=document.getElementById("chatInput");

const message=input.value.trim();

if(!message) return;

appendMessage(message,"user");

input.value="";

const reply=await callGemini(message);

appendMessage(reply,"bot");

}

async function callGemini(prompt){

const apiKey="AIzaSyB8opT9wOuUoJ5aAzuNZHCNCVDzd5WKYCE";

const response=await fetch(
"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key="+apiKey,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[
{
parts:[{text:prompt}]
}
]
})
}
);

const data=await response.json();

return data.candidates[0].content.parts[0].text;

}

/* ENTER KEY SEND */

document.getElementById("chatInput").addEventListener("keypress",function(e){

if(e.key==="Enter"){
sendMessage();
}

});

</script>

</body>
</html>
