<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maverick Admin Portal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    /* Global Background & Font */
    body { 
        font-family: 'Inter', sans-serif; 
        background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
        background-attachment: fixed;
        min-height: 100vh;
        color: #2c3e50;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.3); }
    ::-webkit-scrollbar-thumb { background: #6a5acd; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #5848c2; }

    /* Navigation & UI Elements */
    .nav-item.active { 
        background-color: #6a5acd; 
        color: white; 
    }
    .nav-item.active svg { color: white; }

    /* Animation Keyframes */
    @keyframes fadeIn { 
        from { opacity: 0; transform: translateY(10px); } 
        to { opacity: 1; transform: translateY(0); } 
    }
    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
</style>
</head>
<body class="bg-slate-50 h-screen flex overflow-hidden text-slate-800">

    <!-- Sidebar -->
    <aside class="w-64 bg-slate-900 text-slate-300 flex flex-col flex-shrink-0 transition-all duration-300">
        <div class="p-6 flex items-center gap-3">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold">M</div>
            <h1 class="text-xl font-bold text-white">Maverick</h1>
        </div>

        <nav class="flex-1 px-4 space-y-2 overflow-y-auto">
            <button onclick="navigate('dashboard')" id="nav-dashboard" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-slate-800 transition-colors">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                <span class="font-medium">Dashboard</span>
            </button>
            <button onclick="navigate('fresher')" id="nav-fresher" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-slate-800 transition-colors">
                <i data-lucide="users" class="w-5 h-5"></i>
                <span class="font-medium">Fresher Management</span>
            </button>
            <button onclick="navigate('agent')" id="nav-agent" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-slate-800 transition-colors">
                <i data-lucide="bot" class="w-5 h-5"></i>
                <span class="font-medium">Agent Monitoring</span>
            </button>
            <button onclick="navigate('reports')" id="nav-reports" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-slate-800 transition-colors">
                <i data-lucide="bar-chart-3" class="w-5 h-5"></i>
                <span class="font-medium text-slate-300">Reports</span>
            </button>
            <button onclick="navigate('insights')" id="nav-insights" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-slate-800 transition-colors">
                <i data-lucide="sparkles" class="w-5 h-5"></i>
                <span class="font-medium">AI Insights</span>
            </button>
            <button onclick="navigate('settings')" id="nav-settings" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-slate-800 transition-colors">
                <i data-lucide="settings" class="w-5 h-5"></i>
                <span class="font-medium">Settings</span>
            </button>
        </nav>

        <div class="p-4 border-t border-slate-800">
            <button class="w-full flex items-center gap-2 text-sm text-slate-400 hover:text-white transition-colors">
                <i data-lucide="chevron-left" class="w-4 h-4"></i>
                Collapse
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0">
        <!-- Header -->
        <header class="bg-white border-b border-slate-200 h-16 flex items-center justify-between px-6 shadow-sm z-10">
            
            <div class="flex items-center gap-4 flex-1">
                <div class="relative w-64">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                    <input type="text" id="searchInput" placeholder="Search by name, email, ID..." 
                        class="w-full pl-10 pr-4 py-2 bg-slate-100 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                </div>
            </div>

            <div class="flex items-center gap-4">
                <!-- Data Simulation Button (Kept for testing your real DB) -->
                <button id="simulate-login-btn" onclick="simulateEmployeeLogin()" 
                    class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700 transition-all flex items-center gap-2"
                    title="Push a test user to your LIVE database">
                    <i data-lucide="user-plus" class="w-4 h-4"></i>
                    <span>Test Live DB Push</span>
                </button>

                <!-- AI Assistant -->
                <button onclick="toggleAIChat()" 
                    class="bg-gradient-to-r from-purple-600 to-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:shadow-lg transition-all flex items-center gap-2">
                    <i data-lucide="sparkles" class="w-4 h-4"></i>
                    AI Assistant
                </button> 

                <!-- Download Report -->
                <button onclick="downloadReport()" 
                    class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-green-700 transition-colors flex items-center gap-2">
                    <i data-lucide="download" class="w-4 h-4"></i>
                    <span>Download Report</span>
                </button>

                <div class="h-8 w-[1px] bg-slate-200 mx-2"></div>

                <!-- Profile Section -->
                <div class="flex items-center gap-3">
                    <div class="text-right hidden md:block">
                        <p id="admin-name-display" class="text-sm font-bold text-slate-800">Loading...</p>
                        <p id="admin-role-display" class="text-xs text-slate-500 capitalize">Authenticating</p>
                    </div>
                    <div class="w-10 h-10 bg-slate-200 rounded-full flex items-center justify-center">
                        <i data-lucide="user" class="w-5 h-5 text-slate-500"></i>
                    </div>
                </div>
            </div>
        </header>

        <!-- Dynamic Content Area -->
        <div id="page-content" class="flex-1 overflow-y-auto p-6 relative">
            <!-- Loading Indicator -->
            <div class="flex h-full items-center justify-center flex-col text-slate-500">
                <i data-lucide="loader-2" class="w-10 h-10 animate-spin mb-4 text-blue-600"></i>
                <p>Connecting to Live Database...</p>
            </div>
        </div>
    </main>

    <!-- AI Chat Modal -->
    <div id="ai-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl h-[600px] flex flex-col animate-fade-in">
            <div class="flex items-center justify-between p-4 border-b border-slate-200 bg-gradient-to-r from-purple-600 to-blue-600 rounded-t-2xl">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-white/20 backdrop-blur-sm rounded-lg flex items-center justify-center">
                        <i data-lucide="bot" class="w-6 h-6 text-white"></i>
                    </div>
                    <div>
                        <h2 class="text-lg font-bold text-white">AI Admin Assistant</h2>
                        <p class="text-xs text-white/90">Powered by Advanced Analytics</p>
                    </div>
                </div>
                <button onclick="toggleAIChat()" class="text-white hover:bg-white/20 p-2 rounded-lg transition">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50">
                <div class="flex gap-3">
                    <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-purple-600 to-blue-600 flex items-center justify-center flex-shrink-0">
                        <i data-lucide="bot" class="w-4 h-4 text-white"></i>
                    </div>
                    <div class="bg-white p-3 rounded-2xl rounded-tl-none shadow-sm text-sm text-slate-700 max-w-[80%] border border-slate-100">
                        Hello! I'm your AI Admin Assistant. I monitor real-time user registrations. Ask me anything about the active freshers!
                    </div>
                </div>
            </div>

            <div class="p-4 border-t border-slate-200 bg-white rounded-b-2xl">
                <div class="flex gap-2">
                    <input id="chat-input" type="text" placeholder="Ask anything..." class="flex-1 bg-slate-100 border-0 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-purple-500 outline-none">
                    <button onclick="sendMessage()" class="bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-xl transition">
                        <i data-lucide="send" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN APP LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global State Array for dynamically fetched users
        window.freshersData = [];
        window.db = null;
        window.dbPath = null; 

        // Chart instances to prevent canvas reuse errors
        window.chartInstances = { pie: null, bar: null, line: null, agent: null };

        const agentsData = [
            { name: 'Onboarding Agent', status: 'Active', tasks: 120, accuracy: 95, latency: 200, lastActive: '2 min ago' },
            { name: 'Assessment Agent', status: 'Active', tasks: 500, accuracy: 92, latency: 350, lastActive: '5 min ago' },
            { name: 'Profile Agent', status: 'Active', tasks: 85, accuracy: 98, latency: 150, lastActive: '1 min ago' },
            { name: 'Reporting Agent', status: 'Active', tasks: 45, accuracy: 96, latency: 280, lastActive: '10 min ago' },
        ];

        // LIVE DATABASE CREDENTIALS
        const firebaseConfig = {
            apiKey: "AIzaSyDPe0Zp69bnM9251w0FfnH1UPhGedGh4qo",
            authDomain: "novus-9dfb8.firebaseapp.com",
            projectId: "novus-9dfb8",
            storageBucket: "novus-9dfb8.appspot.com",
            messagingSenderId: "641276518161",
            appId: "1:641276518161:web:ee2c11e2662e86e59bb6b0"
        };

        // --- Firebase Database Integration ---
        async function initializeRealtimeData() {
            try {
                // Initialize Firebase directly with your configuration
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                window.db = getFirestore(app);

                // Set database path to your "users" collection based on your screenshot
                window.dbPath = collection(window.db, 'users');
                
                let initialAuthCheck = false;

                // Listen to Auth State
                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        // 1. UPDATE THE PROFILE SECTION IN TOP RIGHT
                        const nameDisplay = document.getElementById('admin-name-display');
                        const roleDisplay = document.getElementById('admin-role-display');

                        if (!user.isAnonymous) {
                            try {
                                // Fetch the specific user's document from the "users" collection using their UID
                                const userDocRef = doc(window.db, 'users', user.uid);
                                const userDocSnap = await getDoc(userDocRef);

                                if (userDocSnap.exists()) {
                                    const userData = userDocSnap.data();
                                    // Set Name and Role from Firebase
                                    nameDisplay.innerText = userData.name || user.displayName || user.email || 'Admin User';
                                    roleDisplay.innerText = userData.role ? userData.role : 'Admin';
                                } else {
                                    // Fallback if doc is missing but user is logged in
                                    nameDisplay.innerText = user.displayName || user.email || 'Admin User';
                                    roleDisplay.innerText = 'Admin';
                                }
                            } catch (err) {
                                console.error("Error fetching admin profile:", err);
                                nameDisplay.innerText = user.email || 'Admin User';
                            }
                        } else {
                            // If they are anonymous (just testing the page without logging in)
                            nameDisplay.innerText = 'Test Mode User';
                            roleDisplay.innerText = 'Guest Viewer';
                        }

                        // 2. Fetch Dashboard Data
                        listenToLoggedInEmployees();
                    } else {
                        // Only sign in anonymously if there is absolutely no user logged in
                        if (!initialAuthCheck) {
                            initialAuthCheck = true;
                            await signInAnonymously(auth);
                        }
                    }
                });
            } catch (error) {
                console.error("Firebase init failed.", error);
                
                // Show graceful error UI
                window.freshersData = [];
                const container = document.getElementById('page-content');
                if (container) {
                    container.innerHTML = `
                        <div class="flex h-full items-center justify-center flex-col text-slate-500 animate-fade-in">
                            <i data-lucide="database-zap" class="w-16 h-16 mb-4 text-red-400"></i>
                            <h2 class="text-xl font-bold text-slate-700">Database Connection Failed</h2>
                            <p class="mt-2 text-sm max-w-md text-center">Connection error: ${error.message}</p>
                        </div>
                    `;
                    lucide.createIcons();
                }
            }
        }

        // Listens to the database to fetch users actively logging in
        function listenToLoggedInEmployees() {
            if (!window.db || !window.dbPath) return;

            onSnapshot(window.dbPath, async (snapshot) => {
                // Update Local State array with actual live data from YOUR database
                // IMPORTANT FIX: We are extracting the document ID 
                window.freshersData = snapshot.docs.map(doc => ({
                    ...doc.data(),
                    docId: doc.id 
                }));
                
                // Refresh the Current UI View automatically
                const activeNav = document.querySelector('.nav-item.active');
                const currentPage = activeNav ? activeNav.id.replace('nav-', '') : 'dashboard';
                window.navigate(currentPage);

            }, (error) => {
                console.error("Snapshot error:", error);
            });
        }

        // --- Render Functions ---

        window.renderDashboard = function() {
            const container = document.getElementById('page-content');
            
            // Calculate dynamic stats from real-time data
            const totalFreshers = window.freshersData.length;
            const lowPerformers = window.freshersData.filter(f => f.status === 'At Risk').length;
            const activeTraining = totalFreshers - lowPerformers;
            const avgScore = totalFreshers ? (window.freshersData.reduce((acc, f) => acc + (f.quiz || 0), 0) / totalFreshers).toFixed(1) : 0;

            container.innerHTML = `
                <div class="animate-fade-in space-y-6">
                    <div>
                        <h2 class="text-2xl font-bold text-slate-800">Dashboard</h2>
                        <p class="text-slate-500">Realtime overview of system performance and active users</p>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                            <p class="text-slate-500 text-sm font-medium">Logged-In Users</p>
                            <h3 class="text-3xl font-bold text-slate-800 mt-2">${totalFreshers}</h3>
                            <p class="text-green-600 text-xs mt-1 flex items-center"><i data-lucide="users" class="w-3 h-3 mr-1"></i> Live Update</p>
                        </div>
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                            <p class="text-slate-500 text-sm font-medium">Active Training</p>
                            <h3 class="text-3xl font-bold text-slate-800 mt-2">${activeTraining}</h3>
                            <p class="text-blue-600 text-xs mt-1 flex items-center"><i data-lucide="book-open" class="w-3 h-3 mr-1"></i> Excellent & Active</p>
                        </div>
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                            <p class="text-slate-500 text-sm font-medium">Low Performers</p>
                            <h3 class="text-3xl font-bold text-slate-800 mt-2">${lowPerformers}</h3>
                            <p class="text-red-500 text-xs mt-1 flex items-center"><i data-lucide="alert-circle" class="w-3 h-3 mr-1"></i> Requires Attention</p>
                        </div>
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                            <p class="text-slate-500 text-sm font-medium">Platform Avg Score</p>
                            <h3 class="text-3xl font-bold text-slate-800 mt-2">${avgScore}</h3>
                            <p class="text-green-600 text-xs mt-1 flex items-center"><i data-lucide="trending-up" class="w-3 h-3 mr-1"></i> Across All Users</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                            <h3 class="font-bold text-slate-800 mb-4">Performance Distribution</h3>
                            <div class="h-64"><canvas id="pieChart"></canvas></div>
                        </div>
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                            <h3 class="font-bold text-slate-800 mb-4">Skill Gap Analysis</h3>
                            <div class="h-64"><canvas id="barChart"></canvas></div>
                        </div>
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                            <h3 class="font-bold text-slate-800 mb-4">Daily Activity Graph</h3>
                            <div class="h-64"><canvas id="lineChart"></canvas></div>
                        </div>
                    </div>
                </div>
            `;
            
            lucide.createIcons();
            initCharts();
        }

        window.renderFresherManagement = function(filteredList = null) {
            const container = document.getElementById('page-content');
            const dataToRender = filteredList || window.freshersData;
            
            let cardsHtml = dataToRender.map(f => {
                const statusColor = f.status === 'Excellent' ? 'bg-green-100 text-green-700' : 
                                    f.status === 'At Risk' ? 'bg-red-100 text-red-700' : 'bg-blue-100 text-blue-700';
                
                // Fallbacks mapping fields from your "users" collection
                const name = f.name || 'Unknown User';
                // If they don't have an EMPID, show the first few letters of their UID
                const id = f.EMPID || f.id || (f.docId ? 'UID: ' + f.docId.substring(0,8) + '...' : 'Pending ID');
                // Use 'role' if 'dept' isn't available
                const dept = f.dept || f.role || 'Unassigned';
                const quiz = f.quiz || 0;
                const progress = f.progress || 0;
                const skills = f.skills || [];
                
                // Generate initials safely
                let initials = "UU";
                if(name && !name.includes('@')) {
                    initials = name.split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase();
                } else if(name && name.includes('@')) {
                    initials = name.substring(0,2).toUpperCase();
                }

                return `
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 hover:shadow-md transition-shadow">
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 rounded-full bg-slate-200 flex items-center justify-center text-lg font-bold text-slate-600">
                                ${initials}
                            </div>
                            <div class="w-48">
                                <h3 class="font-bold text-slate-800 truncate" title="${name}">${name}</h3>
                                <p class="text-xs text-slate-500">${id}</p>
                            </div>
                        </div>
                        <span class="px-2 py-1 rounded-full text-xs font-bold ${statusColor}">${f.status || 'Active'}</span>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4 text-sm mb-4">
                        <div>
                            <p class="text-slate-500">Department / Role</p>
                            <p class="font-medium capitalize">${dept}</p>
                        </div>
                        <div>
                            <p class="text-slate-500">Quiz Avg</p>
                            <p class="font-medium">${quiz}%</p>
                        </div>
                    </div>

                    <div class="mb-4">
                        <p class="text-slate-500 text-xs mb-2">Skills</p>
                        <div class="flex flex-wrap gap-2">
                            ${skills.length > 0 ? skills.map(s => `<span class="px-2 py-1 bg-slate-100 rounded text-xs text-slate-600">${s}</span>`).join('') : '<span class="text-slate-400 text-xs italic">No skills listed</span>'}
                        </div>
                    </div>

                    <div>
                        <div class="flex justify-between text-xs mb-1">
                            <span>Overall Progress</span>
                            <span>${progress}%</span>
                        </div>
                        <div class="w-full bg-slate-100 rounded-full h-2">
                            <div class="bg-blue-600 h-2 rounded-full" style="width: ${progress}%"></div>
                        </div>
                    </div>
                    
                    <button class="w-full mt-4 bg-blue-50 text-blue-600 py-2 rounded-lg text-sm font-medium hover:bg-blue-100 transition">View Details</button>
                </div>`;
            }).join('');

            if(cardsHtml === '') {
                cardsHtml = `<div class="col-span-3 text-center p-10 text-slate-500">
                    <i data-lucide="database" class="w-12 h-12 mx-auto mb-3 opacity-20"></i>
                    No freshers found in the database. Wait for users to sign up!
                </div>`;
            }

            container.innerHTML = `
                <div class="animate-fade-in space-y-6">
                    <div class="flex justify-between items-center">
                        <div>
                            <h2 class="text-2xl font-bold text-slate-800">Live Fresher Management</h2>
                            <p class="text-slate-500">Monitor all currently registered users on the platform</p>
                        </div>
                        <button class="flex items-center gap-2 bg-white border border-slate-300 px-4 py-2 rounded-lg text-sm font-medium">
                            <i data-lucide="filter" class="w-4 h-4"></i> Filters
                        </button>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        ${cardsHtml}
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        window.renderAgentMonitoring = function() {
            const container = document.getElementById('page-content');
            
            const agentCards = agentsData.map(agent => `
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                    <div class="flex items-start justify-between mb-4">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center">
                                <i data-lucide="bot" class="w-5 h-5 text-white"></i>
                            </div>
                            <div>
                                <h3 class="font-bold text-slate-800 text-sm">${agent.name}</h3>
                                <p class="text-xs text-slate-500">${agent.lastActive}</p>
                            </div>
                        </div>
                        <span class="px-2 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-700 border border-green-200">Active</span>
                    </div>
                    <div class="space-y-3">
                         <div class="flex items-center justify-between p-2 bg-blue-50 rounded-lg">
                            <div class="flex items-center gap-2">
                                <i data-lucide="activity" class="w-3 h-3 text-blue-600"></i>
                                <span class="text-xs font-medium text-slate-700">Tasks</span>
                            </div>
                            <span class="text-sm font-bold text-blue-600">${agent.tasks}</span>
                        </div>
                        <div class="flex items-center justify-between p-2 bg-green-50 rounded-lg">
                            <div class="flex items-center gap-2">
                                <i data-lucide="check-circle" class="w-3 h-3 text-green-600"></i>
                                <span class="text-xs font-medium text-slate-700">Accuracy</span>

        // --- Chart Logic ---
        function initCharts() {
            // Destroy existing charts
            if(window.chartInstances.pie) window.chartInstances.pie.destroy();
            if(window.chartInstances.bar) window.chartInstances.bar.destroy();
            if(window.chartInstances.line) window.chartInstances.line.destroy();

            // Dynamic Chart Data based on Database fetch
            const excellent = window.freshersData.filter(f => f.status === 'Excellent').length;
            const active = window.freshersData.filter(f => f.status === 'Active').length || window.freshersData.filter(f => !f.status).length;
            const atRisk = window.freshersData.filter(f => f.status === 'At Risk').length;

            const pieCtx = document.getElementById('pieChart');
            if(pieCtx && window.freshersData.length > 0) {
                window.chartInstances.pie = new Chart(pieCtx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Excellent', 'Active', 'At Risk'],
                        datasets: [{
                            data: [excellent, active, atRisk],
                            backgroundColor: ['#10b981', '#f59e0b', '#ef4444'],
                            borderWidth: 0
                        }]
                    },
                    options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
                });
            }

            const barCtx = document.getElementById('barChart');
            if(barCtx && window.freshersData.length > 0) {
                window.chartInstances.bar = new Chart(barCtx, {
                    type: 'bar',
                    data: {
                        labels: ['Java', 'Python', 'React', 'Node.js', 'Testing'],

        // --- Navigation Logic ---
        window.navigate = function(page) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            const navBtn = document.getElementById(`nav-${page}`);
            if(navBtn) navBtn.classList.add('active');

            if(page === 'dashboard') window.renderDashboard();
            else if(page === 'fresher') window.renderFresherManagement();
            else if(page === 'agent') window.renderAgentMonitoring();
            else if(page === 'reports') window.renderReports();
            else if(page === 'insights') window.renderInsights();
            else if(page === 'settings') window.renderSettings();
        }

        // --- Feature: Test LIVE DB Connection ---
        window.simulateEmployeeLogin = async function() {
            if (!window.db || !window.dbPath) {
                alert("Database not connected correctly. Please check configurations.");
                return;
            }

            const btn = document.getElementById('simulate-login-btn');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Pushing...`;
            lucide.createIcons();

            // Create dynamic mocked user data
            const firstNames = ["Sarah", "John", "Emma", "Liam", "Olivia", "Noah", "Ava", "William", "Sophia", "James"];
            const lastNames = ["Smith", "Johnson", "Williams", "Brown", "Jones", "Garcia", "Miller", "Davis"];
            const randomQuiz = Math.floor(Math.random() * 40) + 60; // 60-100
            
            // This maps to your "users" collection schema
            const newEmployee = {
                role: ['user', 'admin', 'trainee'][Math.floor(Math.random() * 3)],
                name: `${firstNames[Math.floor(Math.random()*firstNames.length)]} ${lastNames[Math.floor(Math.random()*lastNames.length)]}`,
                dept: ['IT', 'Data Science', 'QA', 'Design'][Math.floor(Math.random() * 4)],
                joinDate: new Date().toISOString().split('T')[0],
                quiz: randomQuiz,
                skills: ['JavaScript', 'HTML', 'CSS', 'Python', 'Java'].sort(() => 0.5 - Math.random()).slice(0, 3),
                progress: Math.floor(Math.random() * 50) + 50,
                status: randomQuiz > 85 ? 'Excellent' : randomQuiz < 70 ? 'At Risk' : 'Active'
            };

            try {
                // Pushes directly to the resolved database path ('users')
                await addDoc(window.dbPath, newEmployee);
                
                // Show Success Message
                btn.innerHTML = `<i data-lucide="check" class="w-4 h-4"></i> Data Pushed!`;
                btn.classList.add('bg-green-600');
                btn.classList.remove('bg-blue-600');
                lucide.createIcons();
                
                setTimeout(() => { 
                    btn.innerHTML = originalHTML; 
                    btn.classList.remove('bg-green-600');
                    btn.classList.add('bg-blue-600');
                    lucide.createIcons(); 
                }, 2000);
            } catch (error) {
                console.error("Error pushing to live DB:", error);
                alert("Error pushing to DB. Check console and make sure your Firestore Security Rules allow writes.");
                btn.innerHTML = originalHTML;
                lucide.createIcons();
            }
        };

        // --- AI Chat & Downloads ---
        window.toggleAIChat = function() {
            const modal = document.getElementById('ai-modal');
            modal.classList.toggle('hidden');
        }

        window.sendMessage = function() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            if (!message) return;

            const chatContainer = document.getElementById('chat-messages');
            chatContainer.innerHTML += `
                <div class="flex gap-3 flex-row-reverse animate-fade-in">
                    <div class="w-8 h-8 rounded-lg bg-blue-100 flex items-center justify-center flex-shrink-0">
                        <i data-lucide="user" class="w-4 h-4 text-blue-600"></i>
                    </div>
                    <div class="bg-blue-600 text-white p-3 rounded-2xl rounded-tr-none shadow-sm text-sm max-w-[80%]">
                        ${message}
                    </div>
                </div>
            `;
            lucide.createIcons();
            input.value = '';
            chatContainer.scrollTop = chatContainer.scrollHeight;

            setTimeout(() => {
                let response = `I currently monitor ${window.freshersData.length} registered users in your database.`;
                const lowerMsg = message.toLowerCase();
                
                if (lowerMsg.includes('risk') || lowerMsg.includes('alert')) {
                    const atRisk = window.freshersData.filter(f=>f.status === 'At Risk');
                    response = `Based on the live database, there are ${atRisk.length} users At Risk right now: <br>` + 
                               atRisk.map(f => `<strong>${f.name || f.docId || 'Unknown'} (${f.dept || 'Unassigned'})</strong>`).join(', ');
                } else if (lowerMsg.includes('top') || lowerMsg.includes('best')) {
                    const sorted = [...window.freshersData].sort((a,b) => (b.quiz || 0) - (a.quiz || 0));
                    if(sorted.length > 0) {
                        response = `The top performer is currently <strong>${sorted[0].name || sorted[0].docId || 'Unknown'}</strong> with a ${sorted[0].quiz || 0}% average score.`;
                    }
                }

                chatContainer.innerHTML += `
                    <div class="flex gap-3 animate-fade-in">
                        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-purple-600 to-blue-600 flex items-center justify-center flex-shrink-0">
                            <i data-lucide="bot" class="w-4 h-4 text-white"></i>
                        </div>
                        <div class="bg-white p-3 rounded-2xl rounded-tl-none shadow-sm text-sm text-slate-700 max-w-[80%] border border-slate-100">
                            ${response}
                        </div>
                    </div>
                `;
                lucide.createIcons();
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }, 1000);
        }

        window.downloadReport = function() {
            let csvContent = "data:text/csv;charset=utf-8,ID,Name,Department,Join Date,Quiz Score,Status,Progress\n";
            window.freshersData.forEach(f => {
                let row = `${f.id || f.EMPID || 'N/A'},${f.name || f.docId || 'Unknown'},${f.dept || f.role || 'N/A'},${f.joinDate || 'N/A'},${f.quiz || 0},${f.status || 'Active'},${f.progress || 0}%`;
                csvContent += row + "\n";
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "Maverick_Live_Performance_Report.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // --- Search functionality ---
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            window.navigate('fresher'); // switch to fresher tab
            
            const filteredData = window.freshersData.filter(f => 
                (f.name && f.name.toLowerCase().includes(searchTerm)) || 
                (f.docId && f.docId.toLowerCase().includes(searchTerm)) ||
                (f.id && f.id.toLowerCase().includes(searchTerm)) ||
                (f.EMPID && f.EMPID.toLowerCase().includes(searchTerm)) ||
                (f.dept && f.dept.toLowerCase().includes(searchTerm)) ||
                (f.role && f.role.toLowerCase().includes(searchTerm)) ||
                (f.skills && f.skills.some(s => s.toLowerCase().includes(searchTerm)))
            );
            window.renderFresherManagement(filteredData);
        });

        // Initialize Application DB
        document.addEventListener('DOMContentLoaded', () => {
            initializeRealtimeData();
        });
