<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pastel Profile Agent</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
body {
background: linear-gradient(135deg,#e0c3fc,#8ec5fc);
font-family:'Poppins',sans-serif;
color:#444;
min-height:100vh;
}

.container-main{padding:40px;}

.header-bar{
position:relative;
display:flex;
align-items:center;
justify-content:center;
margin-bottom:50px;
}

.novus-logo-img{
position:absolute;
left:0;
width:80px;
height:80px;
border-radius:50%;
object-fit:contain;
padding:8px;
background:white;
box-shadow:0 8px 25px rgba(0,0,0,0.18);
}

.glass-card{
background:rgba(255,255,255,0.7);
backdrop-filter:blur(12px);
border-radius:20px;
padding:25px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
margin-bottom:25px;
}

.pastel-title{
color:#6a5acd;
font-weight:600;
}

.btn-pastel{
background:linear-gradient(90deg,#ffafbd,#ffc3a0);
border:none;
color:#444;
font-weight:600;
border-radius:25px;
padding:8px 20px;
}

.progress{
height:18px;
border-radius:20px;
background:#eee;
}

.progress-bar{
background:linear-gradient(90deg,#84fab0,#8fd3f4);
}

input,.form-control{
background:#fff;
border-radius:15px;
border:1px solid #ddd;
}

/* CHATBOT */

#chatbot-container{
position:fixed;
bottom:30px;
right:30px;
z-index:1000;
}

.chat-trigger{
width:80px;
height:80px;
background:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.chat-window{
position:absolute;
bottom:100px;
right:0;
width:360px;
height:520px;
background:white;
border-radius:20px;
display:none;
flex-direction:column;
overflow:hidden;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

.chat-header{
background:#eee;
padding:15px;
display:flex;
align-items:center;
justify-content:space-between;
}

.chat-messages{
flex:1;
padding:15px;
overflow-y:auto;
}

.chat-input-area{
display:flex;
padding:10px;
gap:10px;
}

.chat-input{
flex:1;
border-radius:15px;
padding:10px;
border:1px solid #ddd;
}

.chat-send{
background:#6a5acd;
color:white;
border:none;
border-radius:10px;
padding:10px;
cursor:pointer;
}

.message{
padding:10px;
margin-bottom:10px;
border-radius:10px;
}

.bot-msg{background:#eee;}
.user-msg{background:#6a5acd;color:white;}
</style>
</head>

<body>

<div class="container container-main">

<div class="header-bar">
<img src="novus-logo.png" class="novus-logo-img">

<div class="text-center">
<h2 class="pastel-title mb-1">Profile Agent</h2>
<h5 class="pastel-title">MAVERIK TRAINING</h5>
</div>
</div>

<div class="glass-card">

<h5 class="mb-3 pastel-title">Candidate Details</h5>

<div class="row">
<div class="col-md-4"><strong>Name:</strong> <span id="name">Loading...</span></div>
<div class="col-md-4"><strong>ID:</strong> <span id="displayEmpId">Loading...</span></div>
<div class="col-md-4"><strong>Department:</strong> Engineering</div>
</div>

</div>

<div class="glass-card">

<h5 class="pastel-title">Update Performance</h5>

<div class="row">
<div class="col-md-4">
<input type="number" id="quiz" class="form-control" placeholder="Quiz Score">
</div>

<div class="col-md-4">
<input type="number" id="coding" class="form-control" placeholder="Coding Score">
</div>

<div class="col-md-4">
<input type="number" id="assignment" class="form-control" placeholder="Assignment Score">
</div>
</div>

<div class="row mt-3">

<div class="col-md-9">
<input type="file" id="certFile" class="form-control">
</div>

<div class="col-md-3">
<button class="btn btn-pastel w-100" onclick="addCertification()">Upload</button>
</div>

</div>

</div>

<div class="glass-card">
<h6>Certifications</h6>
<ul id="certList"></ul>
</div>

</div>

<!-- CHATBOT -->

<div id="chatbot-container">

<div class="chat-trigger" onclick="toggleChat()">
🤖
</div>

<div class="chat-window" id="chatWindow">

<div class="chat-header">
<b>Rosie Assistant</b>
<span onclick="toggleChat()">✖</span>
</div>

<div class="chat-messages" id="chatMsgs">
<div class="message bot-msg">
Hello 👋 I am Rosie. How can I help you?
</div>
</div>

<div class="chat-input-area">
<input type="text" class="chat-input" id="chatInput">
<button class="chat-send" onclick="sendMessage()">➤</button>
</div>

</div>
</div>

<script>

let certifications=[];

function addCertification(){

const file=document.getElementById("certFile").files[0];

if(file){

const url=URL.createObjectURL(file);

certifications.push({name:file.name,url});

displayCertifications();

}

}

function displayCertifications(){

const list=document.getElementById("certList");

list.innerHTML="";

certifications.forEach(c=>{

list.innerHTML+=`<li><a href="${c.url}" target="_blank">${c.name}</a></li>`;

});

}

function toggleChat(){

const win=document.getElementById("chatWindow");

win.style.display=win.style.display==="flex"?"none":"flex";

}

function sendMessage(){

const input=document.getElementById("chatInput");

const msg=input.value;

if(!msg)return;

const chat=document.getElementById("chatMsgs");

chat.innerHTML+=`<div class="message user-msg">${msg}</div>`;

chat.innerHTML+=`<div class="message bot-msg">Processing...</div>`;

input.value="";

}

</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore,doc,getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyDPe0Zp69bnM9251w0FfnH1UPhGedGh4qo",
authDomain:"novus-9dfb8.firebaseapp.com",
projectId:"novus-9dfb8"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

onAuthStateChanged(auth,async user=>{

if(user){

const docRef=doc(db,"users",user.uid);

const docSnap=await getDoc(docRef);

if(docSnap.exists()){

const data=docSnap.data();

document.getElementById("name").innerText=data.name || "No Name";

document.getElementById("displayEmpId").innerText =
sessionStorage.getItem("loggedInEmpId") || data.employee_id || data.empId || "EMP1001";

}

}

});

</script>

</body>
</html>
