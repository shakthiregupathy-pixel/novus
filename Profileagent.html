<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pastel Profile Agent</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg,#e0c3fc,#8ec5fc);
    font-family: 'Poppins', sans-serif;
    color: #444;
    min-height: 100vh;
}

.container-main {
    padding: 40px;
}

.header-bar {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 50px;
}

.novus-logo-img {
    position: absolute;
    left: 0;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    object-fit: contain;
    padding: 8px;
    background: white;
    box-shadow: 0 8px 25px rgba(0,0,0,0.18);
}

.glass-card {
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 25px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    margin-bottom: 25px;
}

.pastel-title {
    color: #6a5acd;
    font-weight: 600;
}

.btn-pastel {
    background: linear-gradient(90deg, #ffafbd, #ffc3a0);
    border: none;
    color: #444;
    font-weight: 600;
    border-radius: 25px;
    padding: 8px 20px;
}

.progress {
    height: 18px;
    border-radius: 20px;
}

.progress-bar {
    background: linear-gradient(90deg, #84fab0, #8fd3f4);
}

input, .form-control {
    border-radius: 15px;
}
</style>
</head>

<body>

<div class="container container-main">

<div class="header-bar">
<img src="novus-logo.png" class="novus-logo-img">
<div class="text-center">
<h2 class="pastel-title mb-1">Profile Agent</h2>
<h5 class="pastel-title">MAVERIK TRAINING</h5>
</div>
</div>

<div class="glass-card">
<h5 class="mb-3 pastel-title">Candidate Details</h5>
<div class="row">
<div class="col-md-4"><strong>Name:</strong> <span id="name">Loading...</span></div>
<div class="col-md-4"><strong>ID:</strong> <span id="displayEmpId">Loading...</span></div>
<div class="col-md-4"><strong>Department:</strong> Engineering</div>
</div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDPe0Zp69bnM9251w0FfnH1UPhGedGh4qo",
  authDomain: "novus-9dfb8.firebaseapp.com",
  projectId: "novus-9dfb8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async (user) => {
  if (user) {

    try {

      const docRef = doc(db, "users", user.uid);
      const docSnap = await getDoc(docRef);

      if (docSnap.exists()) {

        const data = docSnap.data();

        document.getElementById("name").innerText = data.name || "No Name";

        const empId = sessionStorage.getItem("loggedInEmpId");
        document.getElementById("displayEmpId").innerText = empId || data.empId || "EMP1001";

      }

    } catch (error) {
      console.error(error);
    }

  }
});
</script>

</body>
</html>
